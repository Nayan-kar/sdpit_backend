<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <title>SDPIT Certificate</title>

    <style>

        body {

            margin: 0;
            padding: 0;

            font-family: Arial, sans-serif;
        }

        .certificate-container {

            width: 1400px;
            height: 990px;

            position: relative;

            overflow: hidden;
        }

        .bg-image {

            position: absolute;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            z-index: 1;
        }

        .field {

            position: absolute;

            z-index: 2;

            font-weight: bold;

            color: black;
        }

        .student-name {

            top: 415px;
            left: 500px;

            font-size: 32px;
        }

        .guardian-name {

            top: 485px;
            left: 600px;

            font-size: 24px;
        }

        .course-name {

            top: 560px;
            left: 290px;

            font-size: 28px;
        }

        .duration {

            top: 640px;
            left: 220px;

            font-size: 22px;
        }

        .completion-date {

            top: 735px;
            left: 740px;

            font-size: 20px;
        }

        .grade {

            top: 735px;
            left: 1120px;

            font-size: 20px;
        }

        .certificate-id {

            top: 95px;
            left: 170px;

            font-size: 18px;
        }

        .course-id {

            top: 125px;
            left: 150px;

            font-size: 18px;
        }

        .enrollment-no {

            top: 95px;
            left: 1120px;

            font-size: 18px;
        }

    </style>

</head>

<body>

    <div class="certificate-container">

        <!-- BACKGROUND IMAGE -->

        <img
            src="{{backgroundImage}}"
            class="bg-image"
        />

        <!-- DYNAMIC FIELDS -->

        <div class="field student-name">
            {{studentName}}
        </div>

        <div class="field guardian-name">
            {{guardianName}}
        </div>

        <div class="field course-name">
            {{courseName}}
        </div>

        <div class="field duration">
            {{duration}}
        </div>

        <div class="field completion-date">
            {{completionDate}}
        </div>

        <div class="field grade">
            {{grade}}
        </div>

        <div class="field certificate-id">
            {{certificateId}}
        </div>

        <div class="field course-id">
            {{courseId}}
        </div>

        <div class="field enrollment-no">
            {{enrollmentNo}}
        </div>

    </div>

</body>

</html>
